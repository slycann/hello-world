<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      transition: background-color 0.4s ease;
      font-family: sans-serif;
    }

    h1 {
      font-size: 6rem;
      user-select: none;
    }

    span {
      cursor: pointer;
      transition: opacity 0.2s;
    }

    span:hover {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <h1>
    <span id="hello" onclick="document.body.style.backgroundColor = '#f0a500'">Hello</span>
    &nbsp;
    <span id="world" onclick="document.body.style.backgroundColor = '#3a86ff'">World</span>
  </h1>
</body>
</html>
