<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      transition: background-color 0.4s ease;
      font-family: sans-serif;
    }

    h1 {
      font-size: 6rem;
      user-select: none;
    }

    span {
      cursor: pointer;
      transition: opacity 0.2s;
    }

    span:hover {
      opacity: 0.7;
    }
    #ball {
      position: fixed;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: #ff69b4;
      box-shadow: 0 4px 12px rgba(255, 105, 180, 0.5);
    }
  </style>
</head>
<body>
  <div id="ball"></div>
  <h1>
    <span id="hello" onclick="document.body.style.backgroundColor = '#f0a500'">Hello</span>
    &nbsp;
    <span id="world" onclick="document.body.style.backgroundColor = '#3a86ff'">World</span>
  </h1>

  <script>
    const ball = document.getElementById('ball');
    let x = 100, y = 100;
    let vx = 3, vy = 2.5;
    const size = 50;

    function animate() {
      x += vx;
      y += vy;

      if (x + size >= window.innerWidth || x <= 0) vx *= -1;
      if (y + size >= window.innerHeight || y <= 0) vy *= -1;

      ball.style.left = x + 'px';
      ball.style.top = y + 'px';

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
