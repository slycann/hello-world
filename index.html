<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      transition: background-color 0.4s ease;
      font-family: sans-serif;
    }

    h1 {
      font-size: 6rem;
      user-select: none;
      color: orange;
    }

    span {
      cursor: pointer;
      transition: opacity 0.2s;
    }

    span:hover {
      opacity: 0.7;
    }
    .ball {
      position: fixed;
      border-radius: 50%;
      background-color: #ff69b4;
      box-shadow: 0 4px 12px rgba(255, 105, 180, 0.5);
    }

    .square {
      position: fixed;
      width: 60px;
      height: 60px;
      background-color: transparent;
      transition: background-color 0.1s ease;
    }

    .square.lit {
      background-color: black;
    }

    .square.destroyed {
      background-color: red !important;
      transition: none;
    }

    #ship {
      position: fixed;
      width: 28px;
      height: 34px;
      clip-path: polygon(50% 0%, 0% 100%, 50% 72%, 100% 100%);
      background: #00e5ff;
      filter: drop-shadow(0 0 8px #00e5ff);
      transform-origin: 50% 50%;
      z-index: 20;
    }

    .bullet {
      position: fixed;
      width: 4px;
      height: 12px;
      background: #ffee00;
      border-radius: 2px;
      box-shadow: 0 0 6px #ffee00;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div id="ship"></div>
  <h1>
    <span id="hello" onclick="randomColors()">Hello</span>
    &nbsp;
    <span id="world" onclick="randomColors()">World</span>
  </h1>

  <script>
    const MAX_BALLS = 50;
    const BASE_SIZE = 50;
    const STEP = 3;
    const SHRINK_UNTIL = 10;
    const SQUARE_SIZE = 60;
    const NUM_SQUARES = 17;
    const balls = [];
    const squares = [];

    function randomHex() {
      return '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
    }

    function ballSize(index) {
      if (index < SHRINK_UNTIL) {
        return BASE_SIZE - index * STEP;
      } else {
        const minSize = BASE_SIZE - (SHRINK_UNTIL - 1) * STEP;
        return minSize + (index - SHRINK_UNTIL + 1) * STEP;
      }
    }

    function createSquares() {
      for (let i = 0; i < NUM_SQUARES; i++) {
        const x = SQUARE_SIZE + Math.random() * (window.innerWidth  - SQUARE_SIZE * 3);
        const y = SQUARE_SIZE + Math.random() * (window.innerHeight - SQUARE_SIZE * 3);

        const el = document.createElement('div');
        el.className = 'square';
        el.style.left = x + 'px';
        el.style.top  = y + 'px';
        document.body.appendChild(el);

        squares.push({ x, y, size: SQUARE_SIZE, el, litTimer: null });
      }
    }

    // AABB collision: returns which axis to reflect, or null
    function getCollisionAxis(b, s) {
      const bRight  = b.x + b.size,  bBottom = b.y + b.size;
      const sRight  = s.x + s.size,  sBottom = s.y + s.size;

      if (bRight < s.x || b.x > sRight || bBottom < s.y || b.y > sBottom) return null;

      const overlapLeft   = bRight  - s.x;
      const overlapRight  = sRight  - b.x;
      const overlapTop    = bBottom - s.y;
      const overlapBottom = sBottom - b.y;

      const minX = Math.min(overlapLeft, overlapRight);
      const minY = Math.min(overlapTop,  overlapBottom);

      return minX < minY ? 'x' : 'y';
    }

    function addBall() {
      if (balls.length >= MAX_BALLS) return;

      const index = balls.length;
      const size  = ballSize(index);
      const el    = document.createElement('div');
      el.className = 'ball';
      el.style.width  = size + 'px';
      el.style.height = size + 'px';
      el.style.backgroundColor = randomHex();
      document.body.appendChild(el);

      const baseSpeed = 2 + index * 0.8;
      balls.push({
        el, size,
        x: Math.random() * (window.innerWidth  - size),
        y: Math.random() * (window.innerHeight - size),
        vx: (Math.random() < 0.5 ? 1 : -1) * (baseSpeed + Math.random()),
        vy: (Math.random() < 0.5 ? 1 : -1) * (baseSpeed + Math.random() * 0.5),
        cooldown: {},  // keyed by square index, frames until re-check
      });
    }

    function randomColors() {
      document.body.style.backgroundColor = randomHex();
      balls.forEach(b => b.el.style.backgroundColor = randomHex());
      addBall();
    }

    function animate() {
      updateShip();
      updateBullets();

      balls.forEach(b => {
        b.x += b.vx;
        b.y += b.vy;

        // Wall bouncing
        if (b.x + b.size >= window.innerWidth  || b.x <= 0) b.vx *= -1;
        if (b.y + b.size >= window.innerHeight || b.y <= 0) b.vy *= -1;

        // Square collisions
        squares.forEach((s, i) => {
          if (s.destroyed) return;
          if (b.cooldown[i] > 0) { b.cooldown[i]--; return; }

          const axis = getCollisionAxis(b, s);
          if (axis) {
            if (axis === 'x') b.vx *= -1; else b.vy *= -1;
            b.el.style.backgroundColor = randomHex();
            b.cooldown[i] = 20;

            // Light up the square for 1 second
            s.el.classList.add('lit');
            if (s.litTimer) clearTimeout(s.litTimer);
            s.litTimer = setTimeout(() => s.el.classList.remove('lit'), 1000);
          }
        });

        b.el.style.left = b.x + 'px';
        b.el.style.top  = b.y + 'px';
      });

      requestAnimationFrame(animate);
    }

    // ── Spaceship ──────────────────────────────────────────
    const shipEl = document.getElementById('ship');
    const ship = {
      x: window.innerWidth  / 2,
      y: window.innerHeight / 2,
      angle: 0,       // radians, 0 = pointing up
      vx: 0, vy: 0,
      shootCooldown: 0,
    };

    const keys = {};
    const bullets = [];
    const BULLET_SPEED = 10;
    const THRUST = 0.25;
    const FRICTION = 0.98;
    const ROTATE_SPEED = 0.065;

    document.addEventListener('keydown', e => {
      keys[e.key] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))
        e.preventDefault();
    });
    document.addEventListener('keyup', e => keys[e.key] = false);

    function fireBullet() {
      const el = document.createElement('div');
      el.className = 'bullet';
      document.body.appendChild(el);
      bullets.push({
        el,
        x: ship.x,
        y: ship.y,
        vx:  Math.sin(ship.angle) * BULLET_SPEED,
        vy: -Math.cos(ship.angle) * BULLET_SPEED,
      });
    }

    function updateShip() {
      if (keys['ArrowLeft'])  ship.angle -= ROTATE_SPEED;
      if (keys['ArrowRight']) ship.angle += ROTATE_SPEED;
      if (keys['ArrowUp']) {
        ship.vx += Math.sin(ship.angle) * THRUST;
        ship.vy -= Math.cos(ship.angle) * THRUST;
      }
      if (keys['ArrowDown']) {
        ship.vx -= Math.sin(ship.angle) * THRUST * 0.5;
        ship.vy += Math.cos(ship.angle) * THRUST * 0.5;
      }

      ship.vx *= FRICTION;
      ship.vy *= FRICTION;
      ship.x  += ship.vx;
      ship.y  += ship.vy;

      // Wrap around screen edges
      if (ship.x < 0)  ship.x = window.innerWidth;
      if (ship.x > window.innerWidth)  ship.x = 0;
      if (ship.y < 0)  ship.y = window.innerHeight;
      if (ship.y > window.innerHeight) ship.y = 0;

      if (ship.shootCooldown > 0) ship.shootCooldown--;
      if ((keys[' '] || keys['Spacebar']) && ship.shootCooldown === 0) {
        fireBullet();
        ship.shootCooldown = 12;
      }

      shipEl.style.left      = ship.x + 'px';
      shipEl.style.top       = ship.y + 'px';
      shipEl.style.transform = `translate(-50%, -50%) rotate(${ship.angle}rad)`;
    }

    function updateBullets() {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;

        // Remove bullet if off screen
        if (b.x < 0 || b.x > window.innerWidth || b.y < 0 || b.y > window.innerHeight) {
          b.el.remove();
          bullets.splice(i, 1);
          continue;
        }

        // Check collision with squares
        let hit = false;
        squares.forEach(s => {
          if (hit || s.destroyed) return;
          if (b.x >= s.x && b.x <= s.x + s.size && b.y >= s.y && b.y <= s.y + s.size) {
            // Destroy the square — turn it red permanently
            s.destroyed = true;
            if (s.litTimer) clearTimeout(s.litTimer);
            s.el.classList.remove('lit');
            s.el.classList.add('destroyed');
            hit = true;
          }
        });

        if (hit) {
          b.el.remove();
          bullets.splice(i, 1);
          continue;
        }

        b.el.style.left      = (b.x - 2) + 'px';
        b.el.style.top       = (b.y - 6) + 'px';
        b.el.style.transform = `rotate(${ship.angle}rad)`;
      }
    }

    createSquares();
    addBall();
    animate();
  </script>
</body>
</html>
