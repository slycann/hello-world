<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #ffffff;
      transition: background-color 0.4s ease;
      font-family: sans-serif;
    }

    h1 {
      font-size: 6rem;
      user-select: none;
      color: orange;
    }

    span {
      cursor: pointer;
      transition: opacity 0.2s;
    }

    span:hover {
      opacity: 0.7;
    }
    .ball {
      position: fixed;
      border-radius: 50%;
      background-color: #ff69b4;
      box-shadow: 0 4px 12px rgba(255, 105, 180, 0.5);
    }
  </style>
</head>
<body>
  <h1>
    <span id="hello" onclick="randomColors()">Hello</span>
    &nbsp;
    <span id="world" onclick="randomColors()">World</span>
  </h1>

  <script>
    const MAX_BALLS = 50;
    const BASE_SIZE = 50;
    const STEP = 3;
    const SHRINK_UNTIL = 10;
    const SQUARE_SIZE = 60;
    const NUM_SQUARES = 17;
    const balls = [];
    const squares = [];

    function randomHex() {
      return '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');
    }

    function ballSize(index) {
      if (index < SHRINK_UNTIL) {
        return BASE_SIZE - index * STEP;
      } else {
        const minSize = BASE_SIZE - (SHRINK_UNTIL - 1) * STEP;
        return minSize + (index - SHRINK_UNTIL + 1) * STEP;
      }
    }

    function createSquares() {
      for (let i = 0; i < NUM_SQUARES; i++) {
        squares.push({
          x: SQUARE_SIZE + Math.random() * (window.innerWidth  - SQUARE_SIZE * 3),
          y: SQUARE_SIZE + Math.random() * (window.innerHeight - SQUARE_SIZE * 3),
          size: SQUARE_SIZE,
        });
      }
    }

    // AABB collision: returns which axis to reflect, or null
    function getCollisionAxis(b, s) {
      const bRight  = b.x + b.size,  bBottom = b.y + b.size;
      const sRight  = s.x + s.size,  sBottom = s.y + s.size;

      if (bRight < s.x || b.x > sRight || bBottom < s.y || b.y > sBottom) return null;

      const overlapLeft   = bRight  - s.x;
      const overlapRight  = sRight  - b.x;
      const overlapTop    = bBottom - s.y;
      const overlapBottom = sBottom - b.y;

      const minX = Math.min(overlapLeft, overlapRight);
      const minY = Math.min(overlapTop,  overlapBottom);

      return minX < minY ? 'x' : 'y';
    }

    function addBall() {
      if (balls.length >= MAX_BALLS) return;

      const index = balls.length;
      const size  = ballSize(index);
      const el    = document.createElement('div');
      el.className = 'ball';
      el.style.width  = size + 'px';
      el.style.height = size + 'px';
      el.style.backgroundColor = randomHex();
      document.body.appendChild(el);

      const baseSpeed = 2 + index * 0.8;
      balls.push({
        el, size,
        x: Math.random() * (window.innerWidth  - size),
        y: Math.random() * (window.innerHeight - size),
        vx: (Math.random() < 0.5 ? 1 : -1) * (baseSpeed + Math.random()),
        vy: (Math.random() < 0.5 ? 1 : -1) * (baseSpeed + Math.random() * 0.5),
        cooldown: {},  // keyed by square index, frames until re-check
      });
    }

    function randomColors() {
      document.body.style.backgroundColor = randomHex();
      balls.forEach(b => b.el.style.backgroundColor = randomHex());
      addBall();
    }

    function animate() {
      balls.forEach(b => {
        b.x += b.vx;
        b.y += b.vy;

        // Wall bouncing
        if (b.x + b.size >= window.innerWidth  || b.x <= 0) b.vx *= -1;
        if (b.y + b.size >= window.innerHeight || b.y <= 0) b.vy *= -1;

        // Square collisions
        squares.forEach((s, i) => {
          if (b.cooldown[i] > 0) { b.cooldown[i]--; return; }

          const axis = getCollisionAxis(b, s);
          if (axis) {
            if (axis === 'x') b.vx *= -1; else b.vy *= -1;
            b.el.style.backgroundColor = randomHex();
            b.cooldown[i] = 20; // ignore this square for 20 frames
          }
        });

        b.el.style.left = b.x + 'px';
        b.el.style.top  = b.y + 'px';
      });

      requestAnimationFrame(animate);
    }

    createSquares();
    addBall();
    animate();
  </script>
</body>
</html>
